[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA fallback: serve index.html for any path that doesn't match a static file,
# so refreshing a deep route (e.g. /about) returns the app instead of a 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
